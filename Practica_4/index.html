<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practica 4</title>
  </head>
  <body>
    <h1>Formularios</h1>

    <form action="" method="get">
      <fieldset>
        <legend>Datos personales</legend>
        <div>
          <label for="fname">Primer nombre</label>
          <input name="fisrtName" type="text" placeholder="Nestor" id="fname" />
        </div>
        <br />
        <div>
          <label for="lname">Primer apellido</label>
          <input name="lastName" type="text" placeholder="Rivera" id="lname" />
        </div>
        <br />
        <div>
          <label for="email">Correo</label>
          <input
            name="email"
            type="email"
            placeholder="Example@gmail.com"
            id="email"
          />
        </div>
        <br />
        <div>
          <label for="pass_datos">Contraseña</label>
          <input
            name="pass"
            type="password"
            placeholder="********"
            id="pass_datos"
          />
        </div>
        <br />
        <div>
          <label for="age_datos">Edad</label>
          <input
            name="age"
            type="number"
            placeholder="0"
            id="age_datos"
            min="0"
          />
        </div>
        <br />
        <button>Enviar</button>
      </fieldset>

      <fieldset>
        <legend>Preferencias</legend>
        <button>Enviar</button>

        <div>
          <label for="club_preference">Equipo favorito</label>
          <select name="favoriteClub" id="club_preference">
            <option value="">Elige una opcion</option>
            <option value="CA">Cruz Azul</option>
            <option value="CH">Chivas</option>
            <option value="AM">America</option>
          </select>
        </div>
        <br />
        <div>
          <label for="cond_preferences">Aceptar terminos y condiciones</label>
          <input
            name="terms"
            type="checkbox"
            id="cond_preferences"
            value="on"
          />
          <br />
          <p>Elige una opcion</p>
          <div>
            <label for="ca_radio_preferences">Cruz Azul</label>
            <input
              name="radioPrefs"
              type="radio"
              id="ca_radio_preferences"
              value="CA"
            />
            <label for="ch_radio_preferences">Chivas</label>
            <input
              name="radioPrefs"
              type="radio"
              id="ch_radio_preferences"
              value="CH"
            />
            <label for="am_radio_preferences">America</label>
            <input
              name="radioPrefs"
              type="radio"
              id="am_radio_preferences"
              value="AM"
            />
          </div>
        </div>
      </fieldset>
    </form>
  </body>
</html>
